name: Node.js CI

# Define quando a pipeline vai rodar
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Define as tarefas (jobs) que o robô vai executar
jobs:
  build:
    runs-on: ubuntu-latest # O sistema operacional do servidor virtual

    steps:
    # Passo 1: Baixa o seu código para o servidor
    - name: Checkout do código
      uses: actions/checkout@v3

    # Passo 2: Instala o Node.js
    - name: Configurar Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18' # Você pode mudar para a versão que está usando

    # Passo 3: Instala as dependências (lê o package.json)
    - name: Instalar dependências
      run: npm install

    # Passo 4: Roda os testes (se você tiver testes configurados)
    - name: Rodar testes
      run: npm test
      

