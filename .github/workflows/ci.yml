name: Node.js CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4 # Atualizado para a versão 4

    - name: Configurar Node.js
      uses: actions/setup-node@v4 # Atualizado para a versão 4
      with:
        node-version: '18' 

    - name: Instalar dependências
      run: npm install

    # Etapa alterada: agora verifica se o projeto compila sem erros
    - name: Compilar o projeto (Build)
      run: npm run build
      
      

